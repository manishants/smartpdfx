<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow4" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGradient4)"/>
  
  <!-- Professional Avatar -->
  <g transform="translate(200, 200)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="60" fill="url(#faceGradient4)" filter="url(#shadow4)"/>
    
    <!-- Hair (Modern tech style) -->
    <path d="M -48 -78 Q -58 -88 -38 -93 Q -18 -98 0 -93 Q 18 -98 38 -93 Q 58 -88 48 -78 Q 38 -68 18 -73 Q 0 -78 -18 -73 Q -38 -68 -48 -78 Z" fill="#1F2937"/>
    
    <!-- Glasses -->
    <g stroke="#1F2937" stroke-width="2" fill="none">
      <circle cx="-20" cy="-40" r="12"/>
      <circle cx="20" cy="-40" r="12"/>
      <path d="M -8 -40 L 8 -40"/>
      <path d="M -32 -38 L -38 -35"/>
      <path d="M 32 -38 L 38 -35"/>
    </g>
    <circle cx="-20" cy="-40" r="10" fill="rgba(255,255,255,0.3)"/>
    <circle cx="20" cy="-40" r="10" fill="rgba(255,255,255,0.3)"/>
    
    <!-- Eyes behind glasses -->
    <circle cx="-20" cy="-40" r="3" fill="#1F2937"/>
    <circle cx="20" cy="-40" r="3" fill="#1F2937"/>
    <circle cx="-19" cy="-41" r="1" fill="#FFFFFF"/>
    <circle cx="21" cy="-41" r="1" fill="#FFFFFF"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="-25" rx="2" ry="4" fill="#D97706"/>
    
    <!-- Mouth -->
    <path d="M -8 -10 Q 0 -5 8 -10" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Tech Hoodie -->
    <path d="M -80 40 L -60 20 L -30 30 L 0 25 L 30 30 L 60 20 L 80 40 L 80 120 L -80 120 Z" fill="#1F2937"/>
    
    <!-- Hoodie strings -->
    <circle cx="-8" cy="35" r="2" fill="#6B7280"/>
    <circle cx="8" cy="35" r="2" fill="#6B7280"/>
    <path d="M -8 37 Q -5 45 -2 50" stroke="#6B7280" stroke-width="2" fill="none"/>
    <path d="M 8 37 Q 5 45 2 50" stroke="#6B7280" stroke-width="2" fill="none"/>
    
    <!-- Co-Founder Badge -->
    <rect x="-40" y="85" width="80" height="20" rx="10" fill="#3B82F6"/>
    <text x="0" y="98" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="8" font-weight="bold">CO-FOUNDER</text>
    
    <!-- Code Icon -->
    <g transform="translate(-70, -80)">
      <rect x="0" y="0" width="14" height="10" rx="1" fill="#10B981"/>
      <path d="M 2 2 L 4 4 L 2 6 M 6 2 L 8 4 L 6 6 M 10 2 L 12 4 L 10 6" stroke="#FFFFFF" stroke-width="1" fill="none"/>
    </g>
    
    <!-- Innovation Lightbulb -->
    <g transform="translate(65, -80)">
      <circle cx="6" cy="4" r="4" fill="#F59E0B"/>
      <rect x="4" y="7" width="4" height="3" fill="#6B7280"/>
      <path d="M 3 2 L 4 1 M 9 2 L 8 1 M 6 0 L 6 -1" stroke="#F59E0B" stroke-width="1"/>
    </g>
    
    <!-- Circuit pattern on hoodie -->
    <g transform="translate(0, 60)" stroke="#3B82F6" stroke-width="1" fill="none" opacity="0.5">
      <path d="M -20 0 L -10 0 L -10 5 L 0 5 L 0 0 L 10 0 L 10 5 L 20 5"/>
      <circle cx="-15" cy="0" r="1" fill="#3B82F6"/>
      <circle cx="5" cy="5" r="1" fill="#3B82F6"/>
      <circle cx="15" cy="5" r="1" fill="#3B82F6"/>
    </g>
  </g>
  
  <!-- Name Label -->
  <rect x="50" y="320" width="300" height="60" rx="30" fill="rgba(255,255,255,0.9)" filter="url(#shadow4)"/>
  <text x="200" y="345" text-anchor="middle" fill="#1F2937" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Nishant Singh</text>
  <text x="200" y="365" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="14">Co-Founder & Tech Lead</text>
</svg>