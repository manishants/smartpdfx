<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGradient3)"/>
  
  <!-- Professional Avatar -->
  <g transform="translate(200, 200)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="60" fill="url(#faceGradient3)" filter="url(#shadow3)"/>
    
    <!-- Hair (Professional style) -->
    <path d="M -50 -80 Q -60 -95 -40 -100 Q -20 -105 0 -100 Q 20 -105 40 -100 Q 60 -95 50 -80 Q 45 -70 25 -75 Q 5 -80 -5 -75 Q -25 -70 -50 -80 Z" fill="#7C2D12"/>
    <path d="M -45 -75 Q -35 -85 -15 -80 Q 5 -85 25 -80 Q 35 -85 45 -75 Q 40 -65 20 -70 Q 0 -75 -20 -70 Q -40 -65 -45 -75 Z" fill="#92400E"/>
    
    <!-- Eyes -->
    <circle cx="-20" cy="-40" r="3" fill="#1F2937"/>
    <circle cx="20" cy="-40" r="3" fill="#1F2937"/>
    <circle cx="-19" cy="-41" r="1" fill="#FFFFFF"/>
    <circle cx="21" cy="-41" r="1" fill="#FFFFFF"/>
    
    <!-- Eyelashes -->
    <path d="M -23 -43 L -22 -45 M -20 -44 L -19 -46 M -17 -43 L -16 -45" stroke="#1F2937" stroke-width="1"/>
    <path d="M 17 -43 L 16 -45 M 20 -44 L 19 -46 M 23 -43 L 22 -45" stroke="#1F2937" stroke-width="1"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="-25" rx="2" ry="4" fill="#D97706"/>
    
    <!-- Mouth (slight smile) -->
    <path d="M -8 -10 Q 0 -5 8 -10" stroke="#DC2626" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Professional Blazer -->
    <path d="M -80 40 L -60 20 L -30 30 L 0 25 L 30 30 L 60 20 L 80 40 L 80 120 L -80 120 Z" fill="#7C3AED"/>
    
    <!-- Blouse -->
    <path d="M -30 30 L 30 30 L 25 45 L -25 45 Z" fill="#FFFFFF"/>
    
    <!-- Necklace -->
    <circle cx="0" cy="35" r="3" fill="#F59E0B"/>
    <path d="M -15 32 Q -8 30 0 32 Q 8 30 15 32" stroke="#F59E0B" stroke-width="2" fill="none"/>
    
    <!-- HR Director Badge -->
    <rect x="-35" y="85" width="70" height="20" rx="10" fill="#EC4899"/>
    <text x="0" y="98" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="8" font-weight="bold">HR DIRECTOR</text>
    
    <!-- People Icon -->
    <g transform="translate(-70, -80)">
      <circle cx="4" cy="4" r="2" fill="#F59E0B"/>
      <circle cx="8" cy="4" r="2" fill="#F59E0B"/>
      <path d="M 2 8 Q 4 6 6 8 L 6 12 L 2 12 Z" fill="#F59E0B"/>
      <path d="M 6 8 Q 8 6 10 8 L 10 12 L 6 12 Z" fill="#F59E0B"/>
    </g>
    
    <!-- Heart Icon (People-focused) -->
    <g transform="translate(65, -80)">
      <path d="M 6 3 Q 4 1 2 3 Q 2 5 6 9 Q 10 5 10 3 Q 8 1 6 3 Z" fill="#EC4899"/>
    </g>
    
    <!-- Leadership Crown -->
    <g transform="translate(0, -95)">
      <path d="M -8 0 L -4 -6 L 0 -3 L 4 -6 L 8 0 L 6 2 L -6 2 Z" fill="#F59E0B"/>
      <circle cx="-4" cy="-4" r="1" fill="#FFFFFF"/>
      <circle cx="0" cy="-1" r="1" fill="#FFFFFF"/>
      <circle cx="4" cy="-4" r="1" fill="#FFFFFF"/>
    </g>
  </g>
  
  <!-- Name Label -->
  <rect x="50" y="320" width="300" height="60" rx="30" fill="rgba(255,255,255,0.9)" filter="url(#shadow3)"/>
  <text x="200" y="345" text-anchor="middle" fill="#1F2937" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Sumitra Singh</text>
  <text x="200" y="365" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="14">HR Director & Investor</text>
</svg>